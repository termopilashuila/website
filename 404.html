<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2406CNRCX9"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-2406CNRCX9');
    </script>
    <title>Página no encontrada - Finca Termópilas</title>
    <link rel="icon" href="assets/images/favicon.png" type="image/png">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent-color: #F29F05;
            --background-dark: #000000;
            --text-light: #fdf6ea;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            line-height: 1.6;
            background-color: var(--background-dark);
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            text-align: center;
            overflow-x: hidden;
        }
        
        .error-container {
            min-height: 100vh;
            min-height: 100dvh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                        url('assets/images/error/hero-bg.jpg');
            background-size: cover;
            background-position: center;
            color: #fff;
        }
        
        .logo {
            width: 80px;
            height: auto;
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }
        
        .error-code {
            font-family: 'Lora', serif;
            font-size: 6rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: var(--accent-color);
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.2s forwards;
        }
        
        .error-message {
            font-family: 'Lora', serif;
            font-size: 1.8rem;
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.4s forwards;
        }
        
        .error-description {
            font-size: 1rem;
            margin-bottom: 1.5rem;
            max-width: 400px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.6s forwards;
        }
        
        .redirect-notice {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 1.5rem 0;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.8s forwards;
        }
        
        .home-icon {
            font-size: 2.5rem;
            color: var(--accent-color);
            margin-bottom: 0.8rem;
            animation: pulse 2s infinite;
        }
        
        .countdown-text {
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        
        .countdown-number {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--accent-color);
        }
        
        .home-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 2rem;
            background-color: var(--accent-color);
            color: #000;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            min-height: 44px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 1s forwards;
        }
        
        .home-button:hover {
            transform: translateY(-3px);
            background-color: #FFFFFF;
            color: #000;
            box-shadow: 0 8px 20px rgba(242, 159, 5, 0.3);
        }
        
        .home-button i {
            margin-right: 0.5rem;
        }
        
        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }
        
        /* Mobile Styles */
        @media (max-width: 480px) {
            .error-container {
                padding: 1.5rem;
            }
            
            .logo {
                width: 60px;
                margin-bottom: 1rem;
            }
            
            .error-code {
                font-size: 4rem;
            }
            
            .error-message {
                font-size: 1.4rem;
            }
            
            .error-description {
                font-size: 0.9rem;
            }
            
            .home-icon {
                font-size: 2rem;
            }
            
            .countdown-text {
                font-size: 0.85rem;
            }
            
            .home-button {
                padding: 0.85rem 1.5rem;
                font-size: 0.85rem;
            }
        }
        
        /* Very small screens */
        @media (max-width: 320px) {
            .error-code {
                font-size: 3.5rem;
            }
            
            .error-message {
                font-size: 1.2rem;
            }
        }
        
        /* Reduced motion support */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="error-container" id="main-content">
        <img src="assets/images/logo.png" alt="Finca Termópilas Logo" class="logo">
        
        <div class="error-code">404</div>
        <div class="error-message">Página no encontrada</div>
        <p class="error-description">Lo sentimos, la página que estás buscando no existe o ha sido movida.</p>
        
        <div class="redirect-notice">
            <div class="home-icon">
                <i class="fas fa-home"></i>
            </div>
            <p class="countdown-text">Redirigiendo al inicio en <span class="countdown-number" id="countdown">3</span> segundos...</p>
        </div>
        
        <a href="/" id="home-link" class="home-button">
            <i class="fas fa-arrow-left"></i> Volver al inicio
        </a>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            redirectDelay: 3, // seconds
            homeUrl: '/'
        };
        
        let countdown = CONFIG.redirectDelay;
        const countdownElement = document.getElementById('countdown');
        
        // Track 404 error
        function track404Error() {
            if (typeof gtag !== 'undefined') {
                gtag('event', '404_page_view', {
                    'event_category': 'Error',
                    'event_label': window.location.pathname,
                    'page_path': window.location.pathname,
                    'page_referrer': document.referrer || 'direct'
                });
            }
        }
        
        // Track redirect
        function trackRedirect(method) {
            if (typeof gtag !== 'undefined') {
                gtag('event', '404_redirect_home', {
                    'event_category': 'Navigation',
                    'event_label': method,
                    'from_path': window.location.pathname
                });
            }
        }
        
        // Update countdown display
        function updateCountdown() {
            if (countdownElement) {
                countdownElement.textContent = countdown;
            }
            
            if (countdown <= 0) {
                trackRedirect('auto');
                window.location.href = CONFIG.homeUrl;
            } else {
                countdown--;
                setTimeout(updateCountdown, 1000);
            }
        }
        
        // Initialize
        function initialize() {
            track404Error();
            
            // Start countdown
            setTimeout(updateCountdown, 1000);
            
            // Add click tracking to manual button
            const homeLink = document.getElementById('home-link');
            if (homeLink) {
                homeLink.addEventListener('click', function() {
                    trackRedirect('manual_click');
                });
            }
        }
        
        // Start when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initialize);
        } else {
            initialize();
        }
    </script>
</body>
</html>
