<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discount Popup Automated Test</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        h1 { color: #4ec9b0; }
        .test-container {
            background: #252526;
            border: 1px solid #3e3e42;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .test-item {
            padding: 10px;
            margin: 8px 0;
            background: #2d2d30;
            border-left: 4px solid #555;
            border-radius: 4px;
        }
        .test-item.pass {
            border-left-color: #4ec9b0;
            background: #1e3a2e;
        }
        .test-item.fail {
            border-left-color: #f48771;
            background: #3a1e1e;
        }
        .test-item.running {
            border-left-color: #dcdcaa;
            background: #3a381e;
        }
        .status {
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        .status.pass { background: #4ec9b0; color: #1e1e1e; }
        .status.fail { background: #f48771; color: #1e1e1e; }
        .status.running { background: #dcdcaa; color: #1e1e1e; }
        .details {
            font-size: 12px;
            color: #808080;
            margin-top: 8px;
            font-family: monospace;
        }
        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover { background: #1177bb; }
        button:disabled { background: #555; cursor: not-allowed; }
        .summary {
            background: #2d2d30;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .summary h2 { margin-top: 0; color: #569cd6; }
        .log {
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.6;
            margin-top: 20px;
        }
        .log-entry {
            margin: 4px 0;
            padding: 4px;
        }
        .log-entry.info { color: #4fc1ff; }
        .log-entry.success { color: #4ec9b0; }
        .log-entry.error { color: #f48771; }
        .log-entry.warn { color: #dcdcaa; }
        iframe {
            width: 100%;
            height: 600px;
            border: 2px solid #3e3e42;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>🧪 Discount Popup Automated Test (WEB-024)</h1>
    <p>This page tests localStorage persistence, timer accuracy, and dark pattern removal.</p>

    <div class="test-container">
        <button id="startTests" onclick="runAllTests()">▶️ Start All Tests</button>
        <button onclick="clearTestStorage()">🗑️ Clear Storage</button>
        <button onclick="window.location.reload()">🔄 Reload Page</button>
    </div>

    <div id="testResults"></div>

    <div class="summary" id="summary" style="display:none;">
        <h2>📊 Test Summary</h2>
        <p>Total: <span id="totalTests">0</span></p>
        <p style="color: #4ec9b0;">✓ Passed: <span id="passedTests">0</span></p>
        <p style="color: #f48771;">✗ Failed: <span id="failedTests">0</span></p>
    </div>

    <div class="log" id="logContainer">
        <strong>📝 Test Log</strong>
        <div id="log"></div>
    </div>

    <h2>🌐 Test Page (iframe)</h2>
    <iframe id="testFrame" src="/" style="display:none;"></iframe>

    <script>
        const tests = [];
        let testResults = { total: 0, passed: 0, failed: 0 };

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(`[Test] ${message}`);
        }

        function clearTestStorage() {
            localStorage.clear();
            log('localStorage cleared', 'warn');
            alert('localStorage cleared. Reload the page to test fresh state.');
        }

        function addTest(name, testFn) {
            tests.push({ name, testFn });
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function renderTestItem(name, status, details = '') {
            const resultsDiv = document.getElementById('testResults');
            const testDiv = document.createElement('div');
            testDiv.className = `test-item ${status}`;
            testDiv.id = `test-${tests.length}`;

            const statusSpan = document.createElement('span');
            statusSpan.className = `status ${status}`;
            statusSpan.textContent = status === 'pass' ? '✓ PASS' : status === 'fail' ? '✗ FAIL' : '⏳ RUNNING';

            const nameSpan = document.createElement('span');
            nameSpan.textContent = ` ${name}`;

            testDiv.appendChild(statusSpan);
            testDiv.appendChild(nameSpan);

            if (details) {
                const detailsDiv = document.createElement('div');
                detailsDiv.className = 'details';
                detailsDiv.textContent = details;
                testDiv.appendChild(detailsDiv);
            }

            resultsDiv.appendChild(testDiv);
            return testDiv;
        }

        function updateTestItem(testDiv, status, details = '') {
            testDiv.className = `test-item ${status}`;
            const statusSpan = testDiv.querySelector('.status');
            statusSpan.className = `status ${status}`;
            statusSpan.textContent = status === 'pass' ? '✓ PASS' : '✗ FAIL';

            if (details) {
                let detailsDiv = testDiv.querySelector('.details');
                if (!detailsDiv) {
                    detailsDiv = document.createElement('div');
                    detailsDiv.className = 'details';
                    testDiv.appendChild(detailsDiv);
                }
                detailsDiv.textContent = details;
            }
        }

        function updateSummary() {
            document.getElementById('summary').style.display = 'block';
            document.getElementById('totalTests').textContent = testResults.total;
            document.getElementById('passedTests').textContent = testResults.passed;
            document.getElementById('failedTests').textContent = testResults.failed;
        }

        // Define tests
        addTest('Clear localStorage before tests', async () => {
            localStorage.clear();
            log('Cleared localStorage to start fresh', 'info');
            return { pass: true };
        });

        addTest('Verify popup appears on first visit', async () => {
            log('Loading test page...', 'info');
            const iframe = document.getElementById('testFrame');
            iframe.style.display = 'block';
            iframe.src = '/?t=' + Date.now(); // Cache bust

            await sleep(1000);
            log('Waiting 11 seconds for popup to appear...', 'info');
            await sleep(11000);

            const popupVisible = iframe.contentWindow.document.getElementById('discount-popup')?.style.display === 'flex';

            if (popupVisible) {
                log('✓ Popup appeared', 'success');
                return { pass: true };
            } else {
                log('✗ Popup did not appear', 'error');
                return { pass: false, details: 'Popup element not found or not displayed' };
            }
        });

        addTest('Verify timer starts at 40 seconds', async () => {
            const iframe = document.getElementById('testFrame');
            const timerSpan = iframe.contentWindow.document.getElementById('discount-timer');
            const timerValue = timerSpan?.textContent;

            log(`Timer initial value: ${timerValue}`, 'info');

            if (timerValue === '40') {
                log('✓ Timer starts at 40 seconds', 'success');
                return { pass: true };
            } else {
                log('✗ Timer does not start at 40', 'error');
                return { pass: false, details: `Expected: 40, Got: ${timerValue}` };
            }
        });

        addTest('Verify timer counts down', async () => {
            const iframe = document.getElementById('testFrame');
            const timerSpan = iframe.contentWindow.document.getElementById('discount-timer');
            const before = parseInt(timerSpan.textContent, 10);

            log(`Timer before: ${before}`, 'info');
            await sleep(3000);

            const after = parseInt(timerSpan.textContent, 10);
            log(`Timer after 3s: ${after}`, 'info');

            if (after < before && after >= before - 4) {
                log('✓ Timer counting down correctly', 'success');
                return { pass: true, details: `${before} → ${after} (3s elapsed)` };
            } else {
                log('✗ Timer not counting down properly', 'error');
                return { pass: false, details: `${before} → ${after}` };
            }
        });

        addTest('Dismiss popup and check localStorage', async () => {
            const iframe = document.getElementById('testFrame');
            const closeBtn = iframe.contentWindow.document.getElementById('discount-popup-close');

            log('Clicking close button...', 'info');
            closeBtn.click();
            await sleep(500);

            const storage = {
                dismissed: localStorage.getItem('termopilas_discount_popup_dismissed'),
                dismissedAt: localStorage.getItem('termopilas_discount_popup_dismissed_at'),
                submitted: localStorage.getItem('termopilas_discount_popup_submitted')
            };

            log(`localStorage: ${JSON.stringify(storage)}`, 'info');

            if (storage.dismissed === 'true' && storage.dismissedAt && !storage.submitted) {
                log('✓ localStorage flags set correctly', 'success');
                return { pass: true, details: `dismissed: true, timestamp: ${storage.dismissedAt}` };
            } else {
                log('✗ localStorage flags incorrect', 'error');
                return { pass: false, details: JSON.stringify(storage) };
            }
        });

        addTest('Verify popup stays hidden after refresh', async () => {
            const iframe = document.getElementById('testFrame');

            log('Reloading page...', 'info');
            iframe.src = '/?t=' + Date.now();
            await sleep(1000);

            log('Waiting 11 seconds to check if popup appears...', 'info');
            await sleep(11000);

            const popupVisible = iframe.contentWindow.document.getElementById('discount-popup')?.style.display === 'flex';

            if (!popupVisible) {
                log('✓ Popup stayed hidden (persistence works)', 'success');
                return { pass: true };
            } else {
                log('✗ Popup appeared when it should be hidden', 'error');
                return { pass: false, details: 'Dismissed state not persisted' };
            }
        });

        // Run all tests
        async function runAllTests() {
            document.getElementById('startTests').disabled = true;
            document.getElementById('testResults').innerHTML = '';
            testResults = { total: tests.length, passed: 0, failed: 0 };

            log('Starting test suite...', 'info');
            log('='.repeat(60), 'info');

            for (const test of tests) {
                log(`Running: ${test.name}`, 'info');
                const testDiv = renderTestItem(test.name, 'running');

                try {
                    const result = await test.testFn();
                    const status = result.pass ? 'pass' : 'fail';

                    if (result.pass) {
                        testResults.passed++;
                        log(`✓ PASS: ${test.name}`, 'success');
                    } else {
                        testResults.failed++;
                        log(`✗ FAIL: ${test.name}`, 'error');
                    }

                    updateTestItem(testDiv, status, result.details || '');
                } catch (error) {
                    testResults.failed++;
                    log(`✗ ERROR: ${test.name} - ${error.message}`, 'error');
                    updateTestItem(testDiv, 'fail', error.message);
                }

                await sleep(500);
            }

            log('='.repeat(60), 'info');
            log(`Test suite complete: ${testResults.passed}/${testResults.total} passed`, testResults.failed === 0 ? 'success' : 'error');

            updateSummary();
            document.getElementById('startTests').disabled = false;
        }

        // Initial log message
        log('Test page loaded. Click "Start All Tests" to begin.', 'info');
    </script>
</body>
</html>
