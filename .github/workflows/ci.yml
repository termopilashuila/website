name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: resize/requirements.txt

      - name: Install dependencies
        run: npm ci

      - name: Install image resize dependencies
        run: python -m pip install -r resize/requirements.txt

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Sitemap validate
        run: npm run sitemap:validate

      # Note: Product sync is not run in CI (requires WooCommerce API credentials)
      # Run manually before deployment: npm run sync:products
