name: Lighthouse CI

on:
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: resize/requirements.txt

      - name: Install dependencies
        run: npm ci

      - name: Install image resize dependencies
        run: python -m pip install -r resize/requirements.txt

      - name: Build site
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost/index.html
            http://localhost/alojamiento.html
            http://localhost/blog.html
          staticDistDir: .
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 3
          budgetPath: .github/lighthouse/budget.json
          configPath: .github/lighthouse/lighthouserc.json
